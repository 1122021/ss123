<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            width:100%;
            height: 100%
        }
        .container{
            width: 70%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .header{
            background-image: url(537e247be9ad2d1d286e0cf59050bf41.jpg);
            background-size:cover;
            background-position: center;
            width: 100%;
            height: 30vh;
        }
        .navItem{
            background: lightblue;
            border: 1px solid lightblue;
            padding: 5px;
            text-align: center;
            color: black;
            font-size: 1.3rem;
            flex-basis: 100%;
        }
        .nav{
            display: flex;
            justify-content: space-around;
            position: sticky;
            top:0;
        }
        .article{
            background: lightgrey;
        }
        .subName{
            background: black;
            color: white;
            padding: 10px;
            font-size: xx-large;
        }
        .subGroup{
            padding: 10px;
        }

        .footer{
            background: red;
            padding: 20px;
            text-align: center;
        }

        .item{
            width: 30%;
            height: 30%;
            border: 4px dashed gray;
        }

    </style>
</head>
<body>
    <div class="content">

        <div class="header"></div>

        <div class="nav">
            <div class="navItem">navITem01</div>
            <div class="navItem">navITem02</div>
            <div class="navItem">navITem03</div>
            <div class="navItem">navITem04</div>
        </div>
        
        <div class="article">
            <div class="group">
                <div class="subName">群組1</div>
                <div class="subGroup">
                    <div class="subItem">群組1subgroup01</div>
                    <div class="subItem">群組1subgroup02</div>
                    <div class="subItem">群組1subgroup03</div>
                    <div class="subItem">群組1subgroup04</div>
                    <div class="subItem">群組1subgroup05</div>
                </div>
                <div class="subName">群組2</div>
                <div class="subGroup">
                    <div class="subItem">群組2subgroup01</div>
                    <div class="subItem">群組2subgroup02</div>
                    <div class="subItem">群組2subgroup03</div>
                    <div class="subItem">群組2subgroup04</div>
                    <div class="subItem">群組2subgroup05</div>
                </div>
                <div class="subName">群組3</div>
                <div class="subGroup">
                    <div class="subItem">群組3subgroup01</div>
                    <div class="subItem">群組3subgroup02</div>
                    <div class="subItem">群組3subgroup03</div>
                    <div class="subItem">群組3subgroup04</div>
                    <div class="subItem">群組3subgroup05</div>
                </div>
            </div>
        </div>
        
        <div class="footer">使用<br>正在</div>
       

    </div>
</body>
</html>
